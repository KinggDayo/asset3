<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Umfrage-Tool — Erstelle und verwalte Umfragen einfach und schnell.">
<title>Medmehr-SurveyZ</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
:root{
--c-bg:#ffffff;--c-surface:#f5f6f7;--c-surface2:#eaecee;
--c-text:#1a1a1a;--c-text2:#555;--c-border:#ddd;
--c-accent:#0d9488;--c-accent-hover:#0f766e;--c-accent-light:#ccfbf1;
--c-danger:#dc2626;--c-danger-hover:#b91c1c;
--c-success:#16a34a;--c-overlay:rgba(0,0,0,.4);
--c-skeleton:#e5e7eb;--c-skeleton-shine:#f3f4f6;
--font:'Satoshi',Inter,sans-serif;
--r:8px;--shadow:0 1px 3px rgba(0,0,0,.08);
}
@media(prefers-color-scheme:dark){
:root:not(.light){
--c-bg:#111215;--c-surface:#1a1b1f;--c-surface2:#242529;
--c-text:#e4e4e7;--c-text2:#a1a1aa;--c-border:#333;
--c-accent:#2dd4bf;--c-accent-hover:#14b8a6;--c-accent-light:#042f2e;
--c-skeleton:#27272a;--c-skeleton-shine:#3f3f46;
--c-overlay:rgba(0,0,0,.6);
}}
.dark{
--c-bg:#111215;--c-surface:#1a1b1f;--c-surface2:#242529;
--c-text:#e4e4e7;--c-text2:#a1a1aa;--c-border:#333;
--c-accent:#2dd4bf;--c-accent-hover:#14b8a6;--c-accent-light:#042f2e;
--c-skeleton:#27272a;--c-skeleton-shine:#3f3f46;
--c-overlay:rgba(0,0,0,.6);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:var(--font);background:var(--c-bg);color:var(--c-text);
line-height:1.6;min-height:100vh;transition:background .3s,color .3s}
h1{font-size:clamp(1.5rem,3vw,2rem);font-weight:700}
h2{font-size:clamp(1.25rem,2.5vw,1.5rem);font-weight:700}
h3{font-size:clamp(1rem,2vw,1.25rem);font-weight:600}
p{font-size:clamp(.875rem,1.5vw,1rem)}
a{color:var(--c-accent);text-decoration:none}
header{display:flex;align-items:center;justify-content:space-between;
padding:12px 20px;border-bottom:1px solid var(--c-border);background:var(--c-surface);position:sticky;top:0;z-index:100}
header .logo{font-weight:700;font-size:clamp(1rem,2vw,1.25rem);color:var(--c-accent)}
header nav{display:flex;gap:8px;align-items:center}
.icon-btn{background:none;border:1px solid var(--c-border);border-radius:var(--r);
width:44px;height:44px;display:inline-flex;align-items:center;justify-content:center;
cursor:pointer;color:var(--c-text);font-size:1.2rem;transition:background .2s}
.icon-btn:hover{background:var(--c-surface2)}
main{max-width:800px;margin:0 auto;padding:24px 20px 60px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
min-height:44px;padding:10px 20px;border:none;border-radius:var(--r);
font-family:var(--font);font-size:.9rem;font-weight:500;cursor:pointer;
transition:background .2s,transform .1s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--c-accent);color:#fff}
.btn-primary:hover{background:var(--c-accent-hover)}
.btn-secondary{background:var(--c-surface2);color:var(--c-text);border:1px solid var(--c-border)}
.btn-secondary:hover{background:var(--c-border)}
.btn-danger{background:var(--c-danger);color:#fff}
.btn-danger:hover{background:var(--c-danger-hover)}
.btn-sm{min-height:36px;padding:6px 12px;font-size:.8rem}
input[type="text"],input[type="password"],textarea,select{
width:100%;padding:10px 12px;border:1px solid var(--c-border);border-radius:var(--r);
font-family:var(--font);font-size:.9rem;background:var(--c-bg);color:var(--c-text);
min-height:44px;transition:border-color .2s}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--c-accent)}
textarea{resize:vertical;min-height:80px}
label{display:block;font-size:.85rem;font-weight:500;margin-bottom:4px;color:var(--c-text2)}
.form-group{margin-bottom:16px}
.card{background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--r);padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.75rem;font-weight:500}
.badge-active{background:#d1fae5;color:#065f46}
.badge-inactive{background:#fee2e2;color:#991b1b}
.dark .badge-active{background:#042f2e;color:#2dd4bf}
.dark .badge-inactive{background:#450a0a;color:#fca5a5}
.error-msg{color:var(--c-danger);font-size:.85rem;margin-top:8px;padding:8px 12px;
background:#fef2f2;border-radius:var(--r);border:1px solid #fecaca}
.dark .error-msg{background:#450a0a;border-color:#7f1d1d}
.success-msg{color:var(--c-success);font-size:.85rem;margin-top:8px;padding:8px 12px;
background:#f0fdf4;border-radius:var(--r);border:1px solid #bbf7d0}
.dark .success-msg{background:#052e16;border-color:#166534}
.empty-state{text-align:center;padding:60px 20px;color:var(--c-text2)}
.empty-state svg{width:64px;height:64px;margin-bottom:16px;opacity:.4}
.skeleton{background:linear-gradient(90deg,var(--c-skeleton) 25%,var(--c-skeleton-shine) 50%,var(--c-skeleton) 75%);
background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--r)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skeleton-line{height:16px;margin-bottom:12px;border-radius:4px}
.skeleton-line.w60{width:60%}.skeleton-line.w80{width:80%}.skeleton-line.w40{width:40%}
.skeleton-card{height:80px;margin-bottom:12px}
.survey-list-item{display:flex;align-items:center;justify-content:space-between;
flex-wrap:wrap;gap:12px;padding:16px 20px}
.survey-list-item .info{flex:1;min-width:200px}
.survey-list-item .info h3{margin-bottom:4px}
.survey-list-item .info .meta{font-size:.8rem;color:var(--c-text2);display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.survey-list-item .actions{display:flex;gap:8px;flex-wrap:wrap}
.question-card{border:1px solid var(--c-border);border-radius:var(--r);padding:16px;
margin-bottom:12px;background:var(--c-bg);position:relative}
.question-card .q-header{display:flex;justify-content:space-between;align-items:start;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.question-card .q-actions{display:flex;gap:4px;flex-shrink:0}
.option-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.option-row input{flex:1}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 60px)}
.login-box{width:100%;max-width:360px;padding:32px;text-align:center}
.login-box h2{margin-bottom:24px}
.public-survey{max-width:640px;margin:0 auto}
.radio-group,.checkbox-group{display:flex;flex-direction:column;gap:8px}
.radio-group label,.checkbox-group label{display:flex;align-items:center;gap:8px;
font-size:.9rem;font-weight:400;color:var(--c-text);cursor:pointer;padding:8px 12px;
border:1px solid var(--c-border);border-radius:var(--r);min-height:44px;transition:background .15s}
.radio-group label:hover,.checkbox-group label:hover{background:var(--c-surface)}
.radio-group input,.checkbox-group input{width:18px;height:18px;accent-color:var(--c-accent)}
.scale-group{display:flex;gap:4px;flex-wrap:wrap}
.scale-group label{display:flex;flex-direction:column;align-items:center;gap:4px;
cursor:pointer;padding:8px;border:1px solid var(--c-border);border-radius:var(--r);
min-width:44px;min-height:44px;font-weight:400;color:var(--c-text);transition:all .15s}
.scale-group label:hover{background:var(--c-surface)}
.scale-group input:checked+span{color:var(--c-accent);font-weight:700}
.scale-group input{position:absolute;opacity:0}
.chart-container{max-width:320px;margin:16px auto}
.results-question{margin-bottom:32px}
.results-question h3{margin-bottom:8px}
.text-answers{list-style:none;padding:0}
.text-answers li{padding:8px 12px;border:1px solid var(--c-border);border-radius:var(--r);margin-bottom:4px;font-size:.9rem;background:var(--c-bg)}
.toggle-wrap{display:flex;align-items:center;gap:8px}
.toggle{position:relative;width:48px;height:26px;cursor:pointer}
.toggle input{opacity:0;width:0;height:0}
.toggle .slider{position:absolute;inset:0;background:var(--c-border);border-radius:13px;transition:background .2s}
.toggle .slider::before{content:'';position:absolute;left:3px;top:3px;width:20px;height:20px;
background:#fff;border-radius:50%;transition:transform .2s}
.toggle input:checked+.slider{background:var(--c-accent)}
.toggle input:checked+.slider::before{transform:translateX(22px)}
.confirm-overlay{position:fixed;inset:0;background:var(--c-overlay);display:flex;
align-items:center;justify-content:center;z-index:200;padding:20px}
.confirm-box{background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--r);
padding:24px;max-width:400px;width:100%;text-align:center}
.confirm-box p{margin-bottom:20px}
.confirm-box .actions{display:flex;gap:8px;justify-content:center}
@media(max-width:600px){
.survey-list-item{flex-direction:column;align-items:flex-start}
.survey-list-item .actions{width:100%}
.survey-list-item .actions .btn{flex:1}
}
.logic-toggle{display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-size:.82rem;
color:var(--c-accent);font-weight:500;padding:6px 0;user-select:none;transition:color .2s}
.logic-toggle:hover{color:var(--c-accent-hover)}
.logic-toggle .arrow{display:inline-block;transition:transform .25s;font-size:.7rem}
.logic-toggle.open .arrow{transform:rotate(90deg)}
.logic-panel{max-height:0;overflow:hidden;transition:max-height .35s ease,padding .35s ease;
background:var(--c-surface);border-radius:var(--r);margin-top:8px}
.logic-panel.open{max-height:2000px;padding:12px;border:1px solid var(--c-border)}
.logic-rule-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;
font-size:.85rem;padding:6px 8px;background:var(--c-bg);border-radius:var(--r);border:1px solid var(--c-border)}
.logic-rule-row .opt-label{min-width:80px;font-weight:500;color:var(--c-text);flex-shrink:0;
overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px}
.logic-rule-row .arrow-icon{color:var(--c-text2);flex-shrink:0}
.logic-rule-row select{flex:1;min-width:110px;padding:6px 8px;font-size:.82rem;min-height:36px}
.logic-indicator{display:inline-flex;align-items:center;gap:3px;font-size:.7rem;
color:var(--c-accent);margin-left:6px}
.segment-manager{margin-bottom:20px}
.segment-item{display:flex;align-items:center;gap:8px;padding:8px 12px;
border:1px solid var(--c-border);border-radius:var(--r);margin-bottom:6px;background:var(--c-bg)}
.segment-item input{flex:1;min-height:36px;padding:6px 10px;font-size:.85rem}
.segment-badge{display:inline-block;padding:1px 8px;border-radius:12px;font-size:.7rem;
font-weight:500;background:var(--c-surface2);color:var(--c-text2);margin-left:6px}
.segment-assign select{max-width:220px;min-height:36px;font-size:.82rem;padding:4px 8px}
.step-container{max-width:640px;margin:0 auto}
.step-progress-wrap{margin-bottom:20px}
.step-progress-bar{width:100%;height:6px;background:var(--c-surface2);border-radius:3px;overflow:hidden}
.step-progress-fill{height:100%;background:var(--c-accent);border-radius:3px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.step-info{display:flex;justify-content:space-between;font-size:.8rem;color:var(--c-text2);margin-top:6px}
.step-question{animation:fadeSlideIn .35s ease forwards}
@keyframes fadeSlideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
.step-question.slide-back{animation:fadeSlideBack .35s ease forwards}
@keyframes fadeSlideBack{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}
.step-nav{display:flex;justify-content:space-between;gap:12px;margin-top:16px}
.step-nav .btn{flex:1;max-width:200px}
.step-segment-badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:.72rem;
font-weight:500;background:var(--c-accent-light);color:var(--c-accent);margin-bottom:8px}
</style>
</head>
<body>
<header>
<span class="logo"><img src="https://4176c022b7.clvaw-cdnwnd.com/9f1c5d1bc316f88a7b75d3563850a0cd/200001306-1a1501a153/medmehr_Logo_Wort_Bildmarke_Slogan-6.webp?ph=4176c022b7" alt="Medmehr-SurveyZ" style="height:32px; vertical-align:middle; margin-right:8px;">Medmehr-SurveyZ</span>
<nav>
<button class="icon-btn" id="themeToggle" aria-label="Farbmodus wechseln">☀️</button>
<button class="icon-btn" id="logoutBtn" aria-label="Abmelden" style="display:none" title="Abmelden">🚪</button>
</nav>
</header>
<main id="app"></main>
<div id="confirmDialog" class="confirm-overlay" style="display:none"></div>
<script>
const SUPABASE_URL = 'https://nrijlxfeisrisicumimu.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5yaWpseGZlaXNyaXNpY3VtaW11Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNzA2ODUsImV4cCI6MjA5Mjk0NjY4NX0.eZQPt2rOON-6WxpW_U8ZYo3OJDF3cE1JxBwUvicvDNk';
const ADMIN_PASSWORD = 'admin123';
let isLoggedIn = false;
let chartInstances = [];
const $ = s => document.querySelector(s);
const app = () => $('#app');

async function sb(table, method = 'GET', body = null, query = '') {
  const opts = {
    method,
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=representation' : (method === 'PATCH' ? 'return=representation' : '')
    }
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}${query}`, opts);
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.message || 'Verbindungsfehler.'); }
  const text = await r.text();
  return text ? JSON.parse(text) : null;
}

function initTheme() {
  const saved = localStorage.getItem('theme');
  if (saved === 'dark') document.documentElement.classList.add('dark');
  else if (saved === 'light') document.documentElement.classList.add('light');
  updateThemeIcon();
}
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.classList.contains('dark') ||
    (!html.classList.contains('light') && matchMedia('(prefers-color-scheme:dark)').matches);
  html.classList.remove('dark', 'light');
  html.classList.add(isDark ? 'light' : 'dark');
  localStorage.setItem('theme', isDark ? 'light' : 'dark');
  updateThemeIcon();
}
function updateThemeIcon() {
  const html = document.documentElement;
  const isDark = html.classList.contains('dark') ||
    (!html.classList.contains('light') && matchMedia('(prefers-color-scheme:dark)').matches);
  $('#themeToggle').textContent = isDark ? '☀️' : '🌙';
}
$('#themeToggle').addEventListener('click', toggleTheme);
initTheme();

function getRoute() { return location.hash.slice(1) || 'login'; }
function navigate(hash) { location.hash = hash; }
window.addEventListener('hashchange', route);

function route() {
  destroyCharts();
  const r = getRoute();
  const logoutBtn = $('#logoutBtn');
  if (r.startsWith('survey/')) { logoutBtn.style.display = 'none'; return renderPublicSurvey(r.split('/')[1]); }
  if (r === 'login' || r === '') { logoutBtn.style.display = 'none'; if (isLoggedIn) return navigate('admin'); return renderLogin(); }
  if (!isLoggedIn) { logoutBtn.style.display = 'none'; return renderLogin(); }
  logoutBtn.style.display = '';
  if (r === 'admin') return renderDashboard();
  if (r === 'admin/survey/new') return renderEditor(null);
  const editMatch = r.match(/^admin\/survey\/(.+)\/edit$/);
  if (editMatch) return renderEditor(editMatch[1]);
  const resultsMatch = r.match(/^admin\/survey\/(.+)\/results$/);
  if (resultsMatch) return renderResults(resultsMatch[1]);
  renderDashboard();
}
$('#logoutBtn').addEventListener('click', () => { isLoggedIn = false; navigate('login'); });

function destroyCharts() { chartInstances.forEach(c => c.destroy()); chartInstances = []; }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function fmtDate(d) { return new Date(d).toLocaleDateString('de-DE', {day:'2-digit',month:'2-digit',year:'numeric'}); }
function showSkeleton(n = 3) {
  app().innerHTML = Array.from({length: n}, () =>
    '<div class="skeleton skeleton-card"></div><div class="skeleton skeleton-line w80"></div><div class="skeleton skeleton-line w60"></div>'
  ).join('');
}
function confirm(msg) {
  return new Promise(res => {
    const d = $('#confirmDialog');
    d.style.display = 'flex';
    d.innerHTML = `<div class="confirm-box"><p>${esc(msg)}</p><div class="actions">
      <button class="btn btn-secondary" id="cfNo">Abbrechen</button>
      <button class="btn btn-danger" id="cfYes">Bestätigen</button></div></div>`;
    d.querySelector('#cfYes').onclick = () => { d.style.display = 'none'; res(true); };
    d.querySelector('#cfNo').onclick = () => { d.style.display = 'none'; res(false); };
  });
}
function genId() { return crypto.randomUUID ? crypto.randomUUID() : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return(c==='x'?r:r&0x3|0x8).toString(16)}); }

function renderLogin() {
  app().innerHTML = `<div class="login-wrap"><div class="login-box card">
    <h2>Admin-Anmeldung</h2>
    <div class="form-group"><label for="pw">Passwort</label>
    <input type="password" id="pw" placeholder="Passwort eingeben" autofocus></div>
    <button class="btn btn-primary" style="width:100%" id="loginBtn">Anmelden</button>
    <div id="loginErr"></div></div></div>`;
  const doLogin = () => {
    if ($('#pw').value === ADMIN_PASSWORD) { isLoggedIn = true; navigate('admin'); }
    else { $('#loginErr').innerHTML = '<p class="error-msg">Falsches Passwort.</p>'; }
  };
  $('#loginBtn').addEventListener('click', doLogin);
  $('#pw').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  setTimeout(() => { const p = $('#pw'); if(p) p.focus(); }, 100);
}

async function renderDashboard() {
  showSkeleton();
  try {
    const surveys = await sb('surveys', 'GET', null, '?order=created_at.desc');
    const responses = await sb('responses', 'GET', null, '?select=id,survey_id');
    const countMap = {};
    responses.forEach(r => { countMap[r.survey_id] = (countMap[r.survey_id] || 0) + 1; });
    if (!surveys.length) {
      app().innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px">
        <h1>Meine Umfragen</h1>
        <button class="btn btn-primary" onclick="navigate('admin/survey/new')">＋ Neue Umfrage</button>
      </div><div class="empty-state card"><p style="font-size:1.1rem">Noch keine Umfragen vorhanden.</p>
      <p style="margin-top:8px">Erstelle deine erste Umfrage!</p></div>`;
      return;
    }
    let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px">
      <h1>Meine Umfragen</h1>
      <button class="btn btn-primary" onclick="navigate('admin/survey/new')">＋ Neue Umfrage</button></div>`;
    surveys.forEach(s => {
      const cnt = countMap[s.id] || 0;
      html += `<div class="card survey-list-item">
        <div class="info"><h3>${esc(s.title)}</h3>
        <div class="meta"><span>${cnt} Antwort${cnt!==1?'en':''}</span>
        <span class="badge ${s.is_active?'badge-active':'badge-inactive'}">${s.is_active?'Aktiv':'Inaktiv'}</span>
        <span>${fmtDate(s.created_at)}</span></div></div>
        <div class="actions">
        <button class="btn btn-secondary btn-sm" data-edit="${s.id}">Bearbeiten</button>
        <button class="btn btn-secondary btn-sm" data-results="${s.id}">Ergebnisse</button>
        <button class="btn btn-secondary btn-sm" data-copy="${s.id}">Link kopieren</button>
        <button class="btn btn-danger btn-sm" data-del="${s.id}">Löschen</button>
        </div></div>`;
    });
    app().innerHTML = html;
    app().querySelectorAll('[data-edit]').forEach(b => b.addEventListener('click', () => navigate('admin/survey/'+b.dataset.edit+'/edit')));
    app().querySelectorAll('[data-results]').forEach(b => b.addEventListener('click', () => navigate('admin/survey/'+b.dataset.results+'/results')));
    app().querySelectorAll('[data-copy]').forEach(b => b.addEventListener('click', () => {
      const url = location.origin + location.pathname + '#survey/' + b.dataset.copy;
      navigator.clipboard.writeText(url).then(() => { b.textContent = '✓ Kopiert!'; setTimeout(() => b.textContent = 'Link kopieren', 2000); });
    }));
    app().querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', async () => {
      if (await confirm('Umfrage wirklich löschen? Alle Daten gehen verloren.')) {
        try { await sb('surveys','DELETE',null,'?id=eq.'+b.dataset.del); renderDashboard(); }
        catch(e) { alert(e.message); }
      }
    }));
  } catch(e) { app().innerHTML = `<p class="error-msg">Verbindungsfehler. Bitte versuche es erneut.</p>`; }
}

// --- Editor ---
async function renderEditor(surveyId) {
  showSkeleton();
  let survey = { title: '', description: '', is_active: true };
  let questions = [];
  let segments = [];
  let openLogic = {}; // track which logic panels are open

  if (surveyId) {
    try {
      const s = await sb('surveys', 'GET', null, '?id=eq.' + surveyId);
      if (!s.length) { app().innerHTML = '<p class="error-msg">Umfrage nicht gefunden.</p>'; return; }
      survey = s[0];
      questions = await sb('questions', 'GET', null, '?survey_id=eq.' + surveyId + '&order=position.asc');
      questions = questions.map(q => ({...q, options: q.options || [], logic_rules: q.logic_rules || []}));
      try { segments = await sb('segments', 'GET', null, '?survey_id=eq.' + surveyId + '&order=position.asc'); } catch(e) { segments = []; }
    } catch(e) { app().innerHTML = `<p class="error-msg">${esc(e.message)}</p>`; return; }
  }
  if (!questions.length) {
    questions.push({ id: genId(), question_text: '', question_type: 'single_choice', options: [''], required: false, position: 0, logic_rules: [], segment_id: null });
  }

  function hasActiveLogic(q) {
    return (q.logic_rules || []).some(r => r.action && r.action !== 'normal');
  }

  function getSegmentTitle(segId) {
    const seg = segments.find(s => s.id === segId);
    return seg ? seg.title : '';
  }

  function render() {
    let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px">
      <h1>${surveyId ? 'Umfrage bearbeiten' : 'Neue Umfrage erstellen'}</h1>
      <button class="btn btn-secondary btn-sm" onclick="navigate('admin')">← Zurück</button></div>
      <div class="card">
      <div class="form-group"><label for="sTitle">Titel</label>
      <input type="text" id="sTitle" value="${esc(survey.title)}" placeholder="Titel der Umfrage"></div>
      <div class="form-group"><label for="sDesc">Beschreibung</label>
      <textarea id="sDesc" placeholder="Optionale Beschreibung">${esc(survey.description||'')}</textarea></div>
      <div class="form-group"><div class="toggle-wrap">
      <label class="toggle"><input type="checkbox" id="sActive" ${survey.is_active?'checked':''}><span class="slider"></span></label>
      <span style="font-size:.9rem">Umfrage aktiv</span></div></div></div>`;

    // Segment manager
    html += `<div class="card segment-manager">
      <h3 style="margin-bottom:12px">Segmente verwalten</h3>`;
    if (segments.length) {
      segments.forEach((seg, si) => {
        html += `<div class="segment-item">
          <span style="font-size:.8rem;color:var(--c-text2);min-width:20px">${si+1}.</span>
          <input type="text" value="${esc(seg.title)}" data-segtitle="${si}" placeholder="Segmentname">
          <button class="btn btn-danger btn-sm" data-delseg="${si}" aria-label="Segment löschen">✕</button></div>`;
      });
    } else {
      html += `<p style="font-size:.85rem;color:var(--c-text2);margin-bottom:8px">Noch keine Segmente angelegt.</p>`;
    }
    html += `<button class="btn btn-secondary btn-sm" id="addSegBtn" style="margin-top:4px">＋ Segment hinzufügen</button></div>`;

    html += `<h2 style="margin:24px 0 16px">Fragen</h2>`;

    questions.forEach((q, i) => {
      const types = [['single_choice','Einzelauswahl'],['multiple_choice','Mehrfachauswahl'],['text','Freitext'],['checkboxes','Checkboxen'],['scale','Bewertungsskala (1–5)']];
      const hasOpts = ['single_choice','multiple_choice','checkboxes'].includes(q.question_type);
      const canHaveLogic = true;
      const logicActive = hasActiveLogic(q);
      const segTitle = q.segment_id ? getSegmentTitle(q.segment_id) : '';

      html += `<div class="question-card" data-qi="${i}">
        <div class="q-header"><span style="font-weight:600;font-size:.85rem;color:var(--c-text2)">Frage ${i+1}${logicActive ? '<span class="logic-indicator">⑂ Logik</span>':''}</span>
        ${segTitle ? `<span class="segment-badge">Segment: ${esc(segTitle)}</span>` : ''}
        <div class="q-actions">
        ${i>0?`<button class="btn btn-secondary btn-sm" data-moveup="${i}" aria-label="Nach oben">↑</button>`:''}
        ${i<questions.length-1?`<button class="btn btn-secondary btn-sm" data-movedown="${i}" aria-label="Nach unten">↓</button>`:''}
        <button class="btn btn-danger btn-sm" data-delq="${i}" aria-label="Frage löschen">✕</button></div></div>
        <div class="form-group"><label>Fragetext</label>
        <input type="text" value="${esc(q.question_text)}" data-qtext="${i}" placeholder="Deine Frage"></div>
        <div class="form-group"><label>Fragetyp</label>
        <select data-qtype="${i}">${types.map(([v,l])=>`<option value="${v}" ${q.question_type===v?'selected':''}>${l}</option>`).join('')}</select></div>`;

      if (hasOpts) {
        html += `<div class="form-group"><label>Antwortoptionen</label>`;
        (q.options||[]).forEach((o, oi) => {
          html += `<div class="option-row"><input type="text" value="${esc(o)}" data-opt="${i}-${oi}" placeholder="Option ${oi+1}">
          <button class="btn btn-danger btn-sm" data-delopt="${i}-${oi}" aria-label="Option entfernen">✕</button></div>`;
        });
        html += `<button class="btn btn-secondary btn-sm" data-addopt="${i}" style="margin-top:4px">＋ Option</button></div>`;
      }

      // Segment assignment
      if (segments.length) {
        html += `<div class="form-group segment-assign"><label>Segment zuordnen</label>
          <select data-qseg="${i}"><option value="">Kein Segment</option>
          ${segments.map(s => `<option value="${s.id}" ${q.segment_id===s.id?'selected':''}>${esc(s.title)}</option>`).join('')}</select></div>`;
      }

      // Logic panel
      if (canHaveLogic) {
        let logicOpts = q.options || [];
        if (q.question_type === 'scale') logicOpts = ['1', '2', '3', '4', '5'];
        if (q.question_type === 'text') logicOpts = ['Jede Antwort'];
        
        if (logicOpts.length > 0) {
          const isOpen = openLogic[i];
          html += `<div class="form-group">
            <div class="logic-toggle ${isOpen?'open':''}" data-logictoggle="${i}">
              <span class="arrow">▶</span> Verzweigungslogik einrichten</div>
            <div class="logic-panel ${isOpen?'open':''}" data-logicpanel="${i}">`;
          logicOpts.forEach((opt, oi) => {
            const rule = (q.logic_rules||[]).find(r => r.condition_option === opt) || {};
            const action = rule.action || 'normal';
            const displayOpt = opt.trim() ? opt : `Option ${oi+1}`;
            html += `<div class="logic-rule-row">
              <span class="opt-label" title="${esc(displayOpt)}">${esc(displayOpt)}</span>
              <span class="arrow-icon">→</span>
              <select data-laction="${i}-${oi}">
                <option value="normal" ${action==='normal'?'selected':''}>Weiter wie normal</option>
                <option value="jump_to" ${action==='jump_to'?'selected':''}>Springe zu Frage →</option>
                <option value="show_segment" ${action==='show_segment'?'selected':''}>Springe zu Segment →</option>
                <option value="end_survey" ${action==='end_survey'?'selected':''}>Umfrage beenden</option>
              </select>`;
            if (action === 'jump_to') {
              html += `<select data-ltargetq="${i}-${oi}">
                ${questions.filter((_,qi) => qi !== i).map(qq => `<option value="${qq.id}" ${rule.target_question_id===qq.id?'selected':''}>${esc((qq.question_text||'Frage').substring(0,40))}</option>`).join('')}
              </select>`;
            } else if (action === 'show_segment') {
              html += `<select data-ltargets="${i}-${oi}">
                ${segments.map(seg => `<option value="${seg.id}" ${rule.target_segment_id===seg.id?'selected':''}>${esc(seg.title)}</option>`).join('')}
              </select>`;
            }
            html += `</div>`;
          });
          html += `</div></div>`;
        }
      }

      html += `<div class="form-group"><div class="toggle-wrap">
        <label class="toggle"><input type="checkbox" data-qreq="${i}" ${q.required?'checked':''}><span class="slider"></span></label>
        <span style="font-size:.85rem">Pflichtfeld</span></div></div></div>`;
    });

    html += `<button class="btn btn-secondary" id="addQBtn" style="margin:12px 0 24px">＋ Frage hinzufügen</button>
      <div><button class="btn btn-primary" id="saveBtn" style="min-width:160px">💾 Speichern</button></div>
      <div id="editorMsg" style="margin-top:12px"></div>`;
    app().innerHTML = html;
    bindEditorEvents();
  }

  function syncFromDOM() {
    const t = $('#sTitle'); if (t) survey.title = t.value;
    const d = $('#sDesc'); if (d) survey.description = d.value;
    const a = $('#sActive'); if (a) survey.is_active = a.checked;
    // Sync segment titles
    segments.forEach((seg, si) => {
      const inp = document.querySelector(`[data-segtitle="${si}"]`);
      if (inp) seg.title = inp.value;
    });
    // Sync questions
    questions.forEach((q, i) => {
      const txt = document.querySelector(`[data-qtext="${i}"]`); if (txt) q.question_text = txt.value;
      const typ = document.querySelector(`[data-qtype="${i}"]`); if (typ) q.question_type = typ.value;
      const req = document.querySelector(`[data-qreq="${i}"]`); if (req) q.required = req.checked;
      const seg = document.querySelector(`[data-qseg="${i}"]`); if (seg) q.segment_id = seg.value || null;
      if (['single_choice','multiple_choice','checkboxes'].includes(q.question_type)) {
        q.options = (q.options||[]).map((_, oi) => {
          const inp = document.querySelector(`[data-opt="${i}-${oi}"]`);
          return inp ? inp.value : '';
        });
      } else { q.options = []; }
      // Sync logic rules
      let logicOpts = q.options || [];
      if (q.question_type === 'scale') logicOpts = ['1', '2', '3', '4', '5'];
      if (q.question_type === 'text') logicOpts = ['Jede Antwort'];
      
      const rules = [];
      logicOpts.forEach((opt, oi) => {
        const actSel = document.querySelector(`[data-laction="${i}-${oi}"]`);
        if (!actSel) return;
        const action = actSel.value;
        if (action === 'normal') return;
        const rule = { condition_option: opt, action: action };
        if (action === 'jump_to') {
          const tq = document.querySelector(`[data-ltargetq="${i}-${oi}"]`);
          rule.target_question_id = tq ? tq.value : null;
        } else if (action === 'show_segment') {
          const ts = document.querySelector(`[data-ltargets="${i}-${oi}"]`);
          rule.target_segment_id = ts ? ts.value : null;
        }
        rules.push(rule);
      });
      q.logic_rules = rules;
    });
  }

  function bindEditorEvents() {
    // Logic toggle
    document.querySelectorAll('[data-logictoggle]').forEach(el => {
      el.addEventListener('click', () => {
        syncFromDOM();
        const i = +el.dataset.logictoggle;
        openLogic[i] = !openLogic[i];
        render();
      });
    });
    // Logic action change - re-render to show/hide target dropdown
    document.querySelectorAll('[data-laction]').forEach(sel => {
      sel.addEventListener('change', () => { syncFromDOM(); render(); });
    });
    // Segment events
    document.querySelectorAll('[data-delseg]').forEach(b => b.addEventListener('click', async () => {
      syncFromDOM();
      const si = +b.dataset.delseg;
      const segId = segments[si].id;
      questions.forEach(q => { if (q.segment_id === segId) q.segment_id = null; });
      segments.splice(si, 1);
      render();
    }));
    const addSegBtn = $('#addSegBtn');
    if (addSegBtn) addSegBtn.addEventListener('click', () => {
      syncFromDOM();
      segments.push({ id: genId(), title: 'Neues Segment', position: segments.length });
      render();
    });
    // Question type change
    document.querySelectorAll('[data-qtype]').forEach(sel => {
      sel.addEventListener('change', () => {
        syncFromDOM();
        const i = +sel.dataset.qtype;
        questions[i].question_type = sel.value;
        if (['single_choice','multiple_choice','checkboxes'].includes(sel.value) && !questions[i].options.length) questions[i].options = [''];
        render();
      });
    });
    document.querySelectorAll('[data-moveup]').forEach(b => b.addEventListener('click', () => {
      syncFromDOM(); const i = +b.dataset.moveup; [questions[i-1],questions[i]] = [questions[i],questions[i-1]]; render();
    }));
    document.querySelectorAll('[data-movedown]').forEach(b => b.addEventListener('click', () => {
      syncFromDOM(); const i = +b.dataset.movedown; [questions[i],questions[i+1]] = [questions[i+1],questions[i]]; render();
    }));
    document.querySelectorAll('[data-delq]').forEach(b => b.addEventListener('click', async () => {
      syncFromDOM();
      const di = +b.dataset.delq;
      const qId = questions[di].id;
      // Check if any question references this as jump_to target
      const refs = questions.filter((q, qi) => qi !== di && (q.logic_rules||[]).some(r => r.action === 'jump_to' && r.target_question_id === qId));
      if (refs.length) {
        const ok = await confirm('Diese Frage ist Ziel einer Verzweigungsregel. Bitte passe die Logik zuerst an.');
        if (!ok) return;
      }
      if (questions.length > 1) { questions.splice(di, 1); render(); }
    }));
    document.querySelectorAll('[data-addopt]').forEach(b => b.addEventListener('click', () => {
      syncFromDOM(); questions[+b.dataset.addopt].options.push(''); render();
    }));
    document.querySelectorAll('[data-delopt]').forEach(b => b.addEventListener('click', () => {
      syncFromDOM(); const [qi, oi] = b.dataset.delopt.split('-').map(Number);
      if (questions[qi].options.length > 1) { questions[qi].options.splice(oi, 1); render(); }
    }));
    const addQ = $('#addQBtn');
    if (addQ) addQ.addEventListener('click', () => {
      syncFromDOM();
      questions.push({ id: genId(), question_text: '', question_type: 'single_choice', options: [''], required: false, position: questions.length, logic_rules: [], segment_id: null });
      render();
    });
    const saveBtn = $('#saveBtn');
    if (saveBtn) saveBtn.addEventListener('click', saveSurvey);
  }

  async function saveSurvey() {
    syncFromDOM();
    const msgEl = $('#editorMsg');
    if (!survey.title.trim()) { msgEl.innerHTML = '<p class="error-msg">Bitte gib einen Titel ein.</p>'; return; }
    for (let i = 0; i < questions.length; i++) {
      if (!questions[i].question_text.trim()) { msgEl.innerHTML = `<p class="error-msg">Frage ${i+1} hat keinen Fragetext.</p>`; return; }
      if (['single_choice','multiple_choice','checkboxes'].includes(questions[i].question_type)) {
        const filled = questions[i].options.filter(o => o.trim());
        if (filled.length < 1) { msgEl.innerHTML = `<p class="error-msg">Frage ${i+1} benötigt mindestens eine Option.</p>`; return; }
      }
    }
    $('#saveBtn').disabled = true;
    $('#saveBtn').textContent = 'Speichern…';
    try {
      let sid = surveyId;
      if (sid) {
        await sb('surveys', 'PATCH', { title: survey.title, description: survey.description, is_active: survey.is_active }, '?id=eq.' + sid);
        await sb('questions', 'DELETE', null, '?survey_id=eq.' + sid);
        try { await sb('segments', 'DELETE', null, '?survey_id=eq.' + sid); } catch(e) {}
      } else {
        const res = await sb('surveys', 'POST', { title: survey.title, description: survey.description, is_active: survey.is_active });
        sid = res[0].id;
      }
      // Save segments
      if (segments.length) {
        const segData = segments.map((s, i) => ({ id: s.id, survey_id: sid, title: s.title, position: i }));
        await sb('segments', 'POST', segData);
      }
      // Save questions with logic_rules and segment_id
      const qData = questions.map((q, i) => ({
        id: q.id,
        survey_id: sid,
        question_text: q.question_text,
        question_type: q.question_type,
        options: ['single_choice','multiple_choice','checkboxes'].includes(q.question_type) ? q.options.filter(o => o.trim()) : null,
        position: i,
        required: q.required,
        logic_rules: (q.logic_rules && q.logic_rules.length) ? q.logic_rules : null,
        segment_id: q.segment_id || null
      }));
      if (qData.length) await sb('questions', 'POST', qData);
      msgEl.innerHTML = '<p class="success-msg">✓ Umfrage gespeichert!</p>';
      setTimeout(() => navigate('admin'), 1000);
    } catch(e) {
      msgEl.innerHTML = `<p class="error-msg">${esc(e.message)}</p>`;
      $('#saveBtn').disabled = false;
      $('#saveBtn').textContent = '💾 Speichern';
    }
  }
  render();
}

// --- Results ---
async function renderResults(surveyId) {
  showSkeleton(5);
  try {
    const s = await sb('surveys', 'GET', null, '?id=eq.' + surveyId);
    if (!s.length) { app().innerHTML = '<p class="error-msg">Umfrage nicht gefunden.</p>'; return; }
    const survey = s[0];
    const questions = await sb('questions', 'GET', null, '?survey_id=eq.' + surveyId + '&order=position.asc');
    const responses = await sb('responses', 'GET', null, '?survey_id=eq.' + surveyId + '&order=submitted_at.desc');
    let answers = [];
    if (responses.length) {
      const rids = responses.map(r => r.id);
      const batchSize = 20;
      for (let i = 0; i < rids.length; i += batchSize) {
        const batch = rids.slice(i, i + batchSize);
        const batchAnswers = await sb('answers', 'GET', null, '?response_id=in.(' + batch.join(',') + ')');
        answers = answers.concat(batchAnswers);
      }
    }

    let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px">
      <h1>Ergebnisse: ${esc(survey.title)}</h1>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-secondary btn-sm" onclick="navigate('admin')">← Zurück</button>
      <button class="btn btn-primary btn-sm" id="csvBtn">📥 Als CSV exportieren</button></div></div>
      <div class="card" style="margin-bottom:24px"><p><strong>${responses.length}</strong> Einsendung${responses.length !== 1 ? 'en' : ''}</p></div>`;

    if (!responses.length) {
      html += `<div class="empty-state card"><p>Noch keine Antworten eingegangen.</p></div>`;
      app().innerHTML = html;
      $('#csvBtn').addEventListener('click', () => downloadCSV(survey, questions, responses, answers));
      return;
    }

    questions.forEach((q, qi) => {
      const qAnswers = answers.filter(a => a.question_id === q.id);
      // Count unique respondents who saw this question
      const seenRespondents = new Set(qAnswers.map(a => a.response_id)).size;
      html += `<div class="results-question card"><h3>Frage ${qi + 1}: ${esc(q.question_text)}</h3>
        <p style="font-size:.8rem;color:var(--c-text2);margin-bottom:12px">${seenRespondents} von ${responses.length} Probanden haben diese Frage gesehen · ${qAnswers.length} Antwort${qAnswers.length !== 1 ? 'en' : ''}</p>`;

      if (q.question_type === 'text') {
        if (qAnswers.length) {
          html += '<ul class="text-answers">';
          qAnswers.forEach(a => {
            const display = typeof a.answer_value === 'object' && a.answer_value !== null ? (a.answer_value.text || a.answer_value) : a.answer_value;
            html += `<li>${esc(String(display || ''))}</li>`;
          });
          html += '</ul>';
        } else {
          html += '<p style="color:var(--c-text2);font-size:.85rem">Keine Antworten</p>';
        }
      } else {
        if (qAnswers.length) {
          html += `<div class="chart-container"><canvas id="chart-${qi}"></canvas></div>`;
        } else {
          html += '<p style="color:var(--c-text2);font-size:.85rem">Keine Antworten</p>';
        }
      }
      html += '</div>';
    });

    app().innerHTML = html;

    questions.forEach((q, qi) => {
      if (q.question_type === 'text') return;
      const qAnswers = answers.filter(a => a.question_id === q.id);
      let labels = [];
      let counts = {};
      if (q.question_type === 'scale') {
        labels = ['1', '2', '3', '4', '5'];
        labels.forEach(l => counts[l] = 0);
      } else {
        labels = (q.options || []).slice();
        labels.forEach(l => counts[l] = 0);
      }
      qAnswers.forEach(a => {
        let val = a.answer_value;
        if (typeof val === 'object' && val !== null) {
          if (Array.isArray(val)) {
            val.forEach(v => { const sv = String(v); if (counts[sv] !== undefined) counts[sv]++; else { labels.push(sv); counts[sv] = 1; } });
            return;
          }
          val = val.value || val.text || JSON.stringify(val);
        }
        const sv = String(val);
        if (counts[sv] !== undefined) counts[sv]++; else { labels.push(sv); counts[sv] = 1; }
      });
      const data = labels.map(l => counts[l] || 0);
      const colors = ['#0d9488','#f59e0b','#6366f1','#ec4899','#8b5cf6','#10b981','#ef4444','#3b82f6','#f97316','#14b8a6'];
      const canvas = document.getElementById('chart-' + qi);
      if (!canvas) return;
      const chart = new Chart(canvas, {
        type: 'doughnut',
        data: { labels, datasets: [{ data, backgroundColor: colors.slice(0, labels.length), borderWidth: 2, borderColor: '#ffffff' }] },
        options: { 
          responsive: true, 
          plugins: { 
            legend: { 
              position: 'bottom', 
              labels: { 
                font: { family: 'Satoshi, Inter, sans-serif', size: 12 }, 
                color: (document.body.classList.contains('dark') || document.documentElement.classList.contains('dark') || window.matchMedia('(prefers-color-scheme: dark)').matches) ? '#e4e4e7' : '#1a1a1a'
              } 
            },
            tooltip: {
              callbacks: {
                label: function(context) {
                  let label = context.label || '';
                  if (label) label += ': ';
                  const val = context.raw;
                  const dataArr = context.chart.data.datasets[context.datasetIndex].data;
                  const total = dataArr.reduce((a, b) => a + b, 0);
                  const pct = total > 0 ? Math.round((val / total) * 100) : 0;
                  label += val + ' (' + pct + '%)';
                  return label;
                }
              }
            }
          } 
        }
      });
      chartInstances.push(chart);
    });
    $('#csvBtn').addEventListener('click', () => downloadCSV(survey, questions, responses, answers));
  } catch(e) { app().innerHTML = `<p class="error-msg">${esc(e.message)}</p>`; }
}

function downloadCSV(survey, questions, responses, answers) {
  const header = ['Einsendung', 'Zeitpunkt', ...questions.map(q => q.question_text)];
  const rows = [header.map(h => '"' + h.replace(/"/g, '""') + '"').join(',')];
  responses.forEach((resp, ri) => {
    const row = [ri + 1, fmtDate(resp.submitted_at)];
    questions.forEach(q => {
      const ans = answers.find(a => a.response_id === resp.id && a.question_id === q.id);
      if (!ans) {
        // Question not seen by this respondent - leave cell empty
        row.push('');
      } else {
        let val = ans.answer_value;
        if (Array.isArray(val)) val = val.join('; ');
        else if (typeof val === 'object' && val !== null) val = JSON.stringify(val);
        val = String(val || '');
        row.push('"' + val.replace(/"/g, '""') + '"');
      }
    });
    rows.push(row.join(','));
  });
  const bom = '\uFEFF';
  const blob = new Blob([bom + rows.join('\n')], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = survey.title.replace(/[^a-zA-Z0-9äöüÄÖÜß]/g, '_') + '_Ergebnisse.csv';
  a.click();
  URL.revokeObjectURL(url);
}

// --- Public Survey (Step-by-Step with Logic Engine) ---
async function renderPublicSurvey(surveyId) {
  showSkeleton(4);
  try {
    const s = await sb('surveys', 'GET', null, '?id=eq.' + surveyId);
    if (!s.length) {
      app().innerHTML = `<div class="empty-state card" style="margin-top:40px">
        <p style="font-size:1.1rem">Diese Umfrage wurde nicht gefunden oder ist nicht mehr verfügbar.</p></div>`;
      return;
    }
    const survey = s[0];
    if (!survey.is_active) {
      app().innerHTML = `<div class="empty-state card" style="margin-top:40px">
        <p style="font-size:1.1rem">Diese Umfrage ist derzeit nicht verfügbar.</p></div>`;
      return;
    }
    const allQuestions = await sb('questions', 'GET', null, '?survey_id=eq.' + surveyId + '&order=position.asc');
    let segmentsData = [];
    try { segmentsData = await sb('segments', 'GET', null, '?survey_id=eq.' + surveyId); } catch(e) {}

    if (!allQuestions.length) {
      app().innerHTML = `<div class="empty-state card" style="margin-top:40px"><p>Diese Umfrage enthält keine Fragen.</p></div>`;
      return;
    }

    // State
    let currentQIndex = 0;
    let history = []; // stack of { qIndex, activeSegment }
    let activeSegment = null;
    let answersMap = {}; // questionId -> answer value
    let seenQuestionIds = [];
    let stepNumber = 0;
    let goingBack = false;

    function getSegTitle(segId) {
      const seg = segmentsData.find(s => s.id === segId);
      return seg ? seg.title : '';
    }

    function shouldShowQuestion(q) {
      if (!activeSegment) return true;
      return !q.segment_id || q.segment_id === activeSegment;
    }

    function findNextValidIndex(fromIdx) {
      for (let i = fromIdx; i < allQuestions.length; i++) {
        if (shouldShowQuestion(allQuestions[i])) return i;
      }
      return -1;
    }

    function determineNext(curIdx) {
      const q = allQuestions[curIdx];
      const rules = q.logic_rules || [];
      const answer = answersMap[q.id];
      let matchedRule = null;

      if (rules.length && answer != null) {
        if (q.question_type === 'text') {
          if (String(answer).trim() !== '') {
            matchedRule = rules.find(r => r.condition_option === 'Jede Antwort');
          }
        } else if (Array.isArray(answer)) {
          for (const a of answer) {
            matchedRule = rules.find(r => r.condition_option === String(a));
            if (matchedRule) break;
          }
        } else {
          matchedRule = rules.find(r => r.condition_option === String(answer));
        }
      }

      if (matchedRule) {
        if (matchedRule.action === 'end_survey') return { action: 'end' };
        if (matchedRule.action === 'jump_to' && matchedRule.target_question_id) {
          const idx = allQuestions.findIndex(qq => qq.id === matchedRule.target_question_id);
          if (idx !== -1) return { action: 'goto', index: idx, newSegment: null };
        }
        if (matchedRule.action === 'show_segment' && matchedRule.target_segment_id) {
          return { action: 'segment', segmentId: matchedRule.target_segment_id, fromIdx: curIdx + 1 };
        }
      }
      return { action: 'next', fromIdx: curIdx + 1 };
    }

    function getCurrentAnswer() {
      const q = allQuestions[currentQIndex];
      if (q.question_type === 'text') {
        const ta = document.querySelector('#stepAnswer');
        return ta ? ta.value : '';
      } else if (q.question_type === 'single_choice' || q.question_type === 'scale') {
        const checked = document.querySelector('input[name="stepQ"]:checked');
        return checked ? checked.value : null;
      } else {
        const checks = document.querySelectorAll('input[name="stepQ"]:checked');
        return Array.from(checks).map(c => c.value);
      }
    }

    function renderStep() {
      const q = allQuestions[currentQIndex];
      const total = allQuestions.length;
      const pct = Math.min(100, Math.round(((stepNumber + 1) / total) * 100));
      const req = q.required ? ' <span style="color:var(--c-danger)">*</span>' : '';
      const segTitle = q.segment_id ? getSegTitle(q.segment_id) : '';
      const animClass = goingBack ? 'slide-back' : '';
      goingBack = false;

      let html = `<div class="step-container">
        <div class="card" style="text-align:center;margin-bottom:20px">
          <h1 style="margin-bottom:8px">${esc(survey.title)}</h1>
          ${survey.description ? `<p style="color:var(--c-text2)">${esc(survey.description)}</p>` : ''}</div>
        <div class="step-progress-wrap">
          <div class="step-progress-bar"><div class="step-progress-fill" style="width:${pct}%"></div></div>
          <div class="step-info"><span>Frage ${stepNumber+1} von ~${total}</span><span>${pct}%</span></div>
        </div>
        <div class="step-question ${animClass}">
          <div class="card">
            ${segTitle ? `<span class="step-segment-badge">Abschnitt: ${esc(segTitle)}</span>` : ''}
            <h3 style="margin-bottom:12px">${esc(q.question_text)}${req}</h3>`;

      const savedAns = answersMap[q.id];

      if (q.question_type === 'single_choice') {
        html += '<div class="radio-group">';
        (q.options||[]).forEach(opt => {
          const chk = savedAns === opt ? 'checked' : '';
          html += `<label><input type="radio" name="stepQ" value="${esc(opt)}" ${chk}> <span>${esc(opt)}</span></label>`;
        });
        html += '</div>';
      } else if (q.question_type === 'multiple_choice' || q.question_type === 'checkboxes') {
        html += '<div class="checkbox-group">';
        (q.options||[]).forEach(opt => {
          const chk = Array.isArray(savedAns) && savedAns.includes(opt) ? 'checked' : '';
          html += `<label><input type="checkbox" name="stepQ" value="${esc(opt)}" ${chk}> <span>${esc(opt)}</span></label>`;
        });
        html += '</div>';
      } else if (q.question_type === 'text') {
        html += `<textarea id="stepAnswer" placeholder="Deine Antwort…" rows="3">${esc(savedAns||'')}</textarea>`;
      } else if (q.question_type === 'scale') {
        html += '<div class="scale-group">';
        for (let v = 1; v <= 5; v++) {
          const chk = String(savedAns) === String(v) ? 'checked' : '';
          html += `<label><input type="radio" name="stepQ" value="${v}" ${chk}><span>${v}</span></label>`;
        }
        html += '</div>';
      }

      html += `</div></div>
        <div class="step-nav">
          ${history.length > 0 ? '<button class="btn btn-secondary" id="stepBack">← Zurück</button>' : '<span></span>'}
          <button class="btn btn-primary" id="stepNext">Weiter →</button>
        </div>
        <div id="stepMsg" style="margin-top:12px"></div>
      </div>`;

      app().innerHTML = html;

      // Back button
      const backBtn = $('#stepBack');
      if (backBtn) backBtn.addEventListener('click', () => {
        const prev = history.pop();
        if (prev) {
          goingBack = true;
          currentQIndex = prev.qIndex;
          activeSegment = prev.activeSegment;
          stepNumber = Math.max(0, stepNumber - 1);
          renderStep();
        }
      });

      // Next button
      $('#stepNext').addEventListener('click', async () => {
        const answer = getCurrentAnswer();
        const msgEl = $('#stepMsg');

        // Validate required
        if (q.required) {
          if (answer == null || answer === '' || (Array.isArray(answer) && answer.length === 0)) {
            msgEl.innerHTML = '<p class="error-msg">Bitte beantworte diese Pflichtfrage.</p>';
            return;
          }
        }

        // Save answer
        answersMap[q.id] = answer;
        if (!seenQuestionIds.includes(q.id)) seenQuestionIds.push(q.id);

        // Determine next
        const result = determineNext(currentQIndex);
        history.push({ qIndex: currentQIndex, activeSegment });

        if (result.action === 'end') {
          await submitSurvey();
          return;
        }

        let nextIdx = -1;
        if (result.action === 'goto') {
          activeSegment = result.newSegment;
          nextIdx = result.index;
        } else if (result.action === 'segment') {
          activeSegment = result.segmentId;
          nextIdx = findNextValidIndex(result.fromIdx);
        } else {
          nextIdx = findNextValidIndex(result.fromIdx);
        }

        if (nextIdx === -1 || nextIdx >= allQuestions.length) {
          await submitSurvey();
          return;
        }

        currentQIndex = nextIdx;
        stepNumber++;
        renderStep();
      });
    }

    async function submitSurvey() {
      app().innerHTML = `<div class="step-container"><div class="empty-state card" style="margin-top:40px">
        <p style="font-size:1.5rem">⏳</p><h2>Wird gesendet…</h2></div></div>`;
      try {
        const respArr = await sb('responses', 'POST', { survey_id: surveyId });
        const responseId = respArr[0].id;
        const answersData = [];
        seenQuestionIds.forEach(qId => {
          const q = allQuestions.find(qq => qq.id === qId);
          if (!q) return;
          let val = answersMap[qId];
          if (val === undefined || val === null) val = '';
          answersData.push({ response_id: responseId, question_id: qId, answer_value: val });
        });
        if (answersData.length) await sb('answers', 'POST', answersData);
        app().innerHTML = `<div class="step-container"><div class="empty-state card" style="margin-top:60px">
          <p style="font-size:2rem;margin-bottom:16px">✅</p>
          <h2>Vielen Dank für deine Teilnahme!</h2>
          <p style="margin-top:8px;color:var(--c-text2)">Deine Antworten wurden erfolgreich übermittelt.</p></div></div>`;
      } catch(err) {
        app().innerHTML = `<div class="step-container"><p class="error-msg">${esc(err.message)}</p>
          <button class="btn btn-primary" style="margin-top:12px" onclick="renderPublicSurvey('${surveyId}')">Erneut versuchen</button></div>`;
      }
    }

    renderStep();
  } catch(e) {
    app().innerHTML = `<p class="error-msg">Verbindungsfehler. Bitte versuche es erneut.</p>`;
  }
}

// --- Init ---
route();
</script>
